<!DOCTYPE html>
<html>

<head>
    <title>Create Goal</title>
</head>

<body>

    <h1>Create Goal</h1>

    <form method="POST">

        <input
            type="text"
            name="employee_name"
            placeholder="Employee Name"
            required
        >

        <br><br>

        <input
            type="text"
            name="title"
            placeholder="Goal Title"
            required
        >

        <br><br>

        <textarea
            name="description"
            placeholder="Description"
        ></textarea>

        <br><br>

        <input
            type="text"
            name="target"
            placeholder="Target"
            required
        >

        <br><br>

        <input
            type="number"
            name="weightage"
            placeholder="Weightage"
            required
        >

        <br><br>

        <button type="submit">
            Submit Goal
        </button>

    </form>

</body>
</html>
